# AlphaPilot Nginx 配置片段
# ============================================================
# 部署说明：
#   将本文件内容添加到你的 HTTPS server{} 块中，例如：
#   /etc/nginx/conf.d/danerlt.conf 的 server { ... } 内
#
# Nginx 只需配置一次，后续重启 Docker 服务无需再改 Nginx。
#
# 端口规则（百位加环境编号）：
#   local   : backend 8000, frontend 3000  （本地访问，无需 Nginx）
#   dev     : backend 8001, frontend 3001  → /ap-dev
#   test    : backend 8002, frontend 3002  → /ap-test
#   prod    : backend 8003, frontend 3003  → /ap
# ============================================================

# ── 生产环境 /ap ──────────────────────────────────────────────

location /ap/api/ {
    proxy_pass         http://127.0.0.1:8003/ap/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location /ap/ws {
    proxy_pass         http://127.0.0.1:8003/ap/ws;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 3600s;
}

location /ap {
    proxy_pass         http://127.0.0.1:3003;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

