# AlphaPilot Nginx 配置片段
# ============================================================
# 部署说明：
#   将本文件内容添加到你的 HTTPS server{} 块中，例如：
#   /etc/nginx/conf.d/danerlt.conf 的 server { ... } 内
#
# Nginx 只需配置一次，后续重启 Docker 服务无需再改 Nginx。
#
# 端口规则（百位加环境编号）：
#   local   : backend 8000, frontend 3000  （本地访问，无需 Nginx）
#   dev     : backend 8001, frontend 3001  → /ap-dev
#   test    : backend 8002, frontend 3002  → /ap-test
#   prod    : backend 8003, frontend 3003  → /ap
#
# 注意：nginx 剥掉环境前缀再转发给后端，后端路由保持 /api/... /ws 不变
# ============================================================

# ── 全局限流 / 安全头 (post-Plan5 安全审计 H5) ────────────────
# 这些指令必须放在 nginx http{} 块顶层 (不是 server{} 内). 单独保存到
# /etc/nginx/conf.d/00-alphapilot-limits.conf 或合并到主配置.
#
# limit_req_zone $binary_remote_addr zone=ap_login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=ap_api:10m rate=60r/m;
#
# 自定义 log_format 不写 query string (避免 ws ?token= 泄露到 access log):
# log_format ap_log_no_args '$remote_addr - $remote_user [$time_local] '
#                            '"$request_method $uri $server_protocol" '
#                            '$status $body_bytes_sent "$http_referer" '
#                            '"$http_user_agent" "$http_x_forwarded_for"';

# ── 安全头 (放在 server{} 块内全局生效) ───────────────────────
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# add_header X-Frame-Options "DENY" always;
# add_header X-Content-Type-Options "nosniff" always;
# add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ── 生产环境 /ap ──────────────────────────────────────────────

# 限流 login + register (post-Plan5 H4+H5 防 brute force)
location = /ap/api/auth/login {
    limit_req zone=ap_login burst=2 nodelay;
    proxy_pass         http://127.0.0.1:8003/api/auth/login;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

location /ap/api/ {
    limit_req zone=ap_api burst=10 nodelay;
    proxy_pass         http://127.0.0.1:8003/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location /ap/ws {
    # post-Plan5 H5: WS access log 不写 query string (避免 ?token= 落盘)
    access_log /var/log/nginx/ap_ws.log ap_log_no_args;
    proxy_pass         http://127.0.0.1:8003/ws;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 3600s;
}

location /ap {
    proxy_pass         http://127.0.0.1:3003;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

