name: ap-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphapilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alphapilot}
      POSTGRES_DB: alphapilot_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphapilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: postgresql://alphapilot:${DB_PASSWORD:-alphapilot}@postgres:5432/alphapilot_prod
      REDIS_URL: redis://redis:6379/0
      ROOT_PATH: /ap
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        BASE_PATH: /ap
        NEXT_PUBLIC_API_BASE: /ap/api
    ports:
      - "3003:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_prod_data:
