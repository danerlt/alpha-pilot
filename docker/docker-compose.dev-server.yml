name: ap-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphapilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alphapilot}
      POSTGRES_DB: alphapilot_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      # post-Plan5 安全审计 M1: 仅本机访问, 不暴露公网
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphapilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      # post-Plan5 安全审计 M1: 仅本机访问, 不暴露公网
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - ../envs/dev.env
    environment:
      DATABASE_URL: postgresql://alphapilot:${DB_PASSWORD:-alphapilot}@postgres:5432/alphapilot_dev
      REDIS_URL: redis://redis:6379/0
      ROOT_PATH: /ap-dev
    ports:
      # 仅本机, 由 nginx 经 https 反代 (post-Plan5 M1)
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        BASE_PATH: /ap-dev
        NEXT_PUBLIC_API_BASE: /ap-dev/api
    ports:
      # 仅本机, 由 nginx 反代 (post-Plan5 M1)
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_dev_data:
