name: ap-uat

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphapilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alphapilot}
      POSTGRES_DB: alphapilot_uat
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    ports:
      # 仅本机访问, 不暴露公网
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphapilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      # 仅本机访问, 不暴露公网
      - "127.0.0.1:6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - ../envs/uat.env
    environment:
      DATABASE_URL: postgresql://alphapilot:${DB_PASSWORD:-alphapilot}@postgres:5432/alphapilot_uat
      REDIS_URL: redis://redis:6379/0
      ROOT_PATH: /ap-uat
    ports:
      # 仅本机, 由 nginx 经 https 反代
      - "127.0.0.1:8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        BASE_PATH: /ap-uat
        NEXT_PUBLIC_API_BASE: /ap-uat/api
    ports:
      # 仅本机, 由 nginx 反代
      - "127.0.0.1:3002:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_uat_data:
