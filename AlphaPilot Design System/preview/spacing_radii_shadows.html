<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--ap-bg-0);color:var(--ap-fg-1);}
.card{padding:18px;display:flex;flex-direction:column;gap:10px;}
.g{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.chip{background:var(--ap-bg-2);border:1px solid var(--ap-line);border-radius:10px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.box{width:100%;height:32px;border-radius:6px;}
.n{font-family:var(--ap-font-mono);font-size:10px;color:var(--ap-fg-3);}
.row{display:flex;gap:12px;align-items:center;}
.sh-b{flex:1;background:var(--ap-bg-2);border-radius:12px;padding:12px;text-align:center;font-size:11px;color:var(--ap-fg-3);font-family:var(--ap-font-mono);}
</style></head>
<body><div class="card">
<div class="ap-label">Radii</div>
<div class="g">
  <div class="chip"><div class="box" style="background:var(--ap-bg-3);border-radius:6px;"></div><span class="n">6</span></div>
  <div class="chip"><div class="box" style="background:var(--ap-bg-3);border-radius:8px;"></div><span class="n">8</span></div>
  <div class="chip"><div class="box" style="background:var(--ap-bg-3);border-radius:12px;"></div><span class="n">12</span></div>
  <div class="chip"><div class="box" style="background:var(--ap-bg-3);border-radius:16px;"></div><span class="n">16</span></div>
  <div class="chip"><div class="box" style="background:var(--ap-bg-3);border-radius:999px;"></div><span class="n">pill</span></div>
</div>
<div class="ap-label">Shadows</div>
<div class="row">
  <div class="sh-b" style="box-shadow:var(--ap-shadow-1);">shadow-1</div>
  <div class="sh-b" style="box-shadow:var(--ap-shadow-2);">shadow-2</div>
  <div class="sh-b" style="box-shadow:var(--ap-shadow-3);">shadow-3</div>
  <div class="sh-b" style="box-shadow:var(--ap-shadow-glow-mint);color:var(--ap-mint);">glow-mint</div>
</div>
</div></body></html>
