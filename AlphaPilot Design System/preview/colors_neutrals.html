<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ap-bg-0);}
  .card{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:6px;}
  .chip{flex:1;height:56px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;border:1px solid var(--ap-line);}
  .chip .n{font-size:10px;color:var(--ap-fg-3);font-family:var(--ap-font-mono);}
</style></head>
<body><div class="card">
  <div class="ap-label">Neutrals · Surface scale</div>
  <div class="row">
    <div class="chip" style="background:var(--ap-bg-0);"><span class="n">bg-0 · 07090F</span></div>
    <div class="chip" style="background:var(--ap-bg-1);"><span class="n">bg-1 · 0B0E15</span></div>
    <div class="chip" style="background:var(--ap-bg-2);"><span class="n">bg-2 · 11151F</span></div>
    <div class="chip" style="background:var(--ap-bg-3);"><span class="n">bg-3 · 171C29</span></div>
    <div class="chip" style="background:var(--ap-bg-4);"><span class="n">bg-4 · 1F2533</span></div>
  </div>
  <div class="ap-label">Foreground</div>
  <div class="row">
    <div class="chip" style="background:var(--ap-bg-2);color:var(--ap-fg-1);display:flex;align-items:center;justify-content:center;font-weight:600;">fg-1 F5F7FB</div>
    <div class="chip" style="background:var(--ap-bg-2);color:var(--ap-fg-2);display:flex;align-items:center;justify-content:center;">fg-2 C7CDDB</div>
    <div class="chip" style="background:var(--ap-bg-2);color:var(--ap-fg-3);display:flex;align-items:center;justify-content:center;">fg-3 8893A8</div>
    <div class="chip" style="background:var(--ap-bg-2);color:var(--ap-fg-4);display:flex;align-items:center;justify-content:center;">fg-4 5A6478</div>
    <div class="chip" style="background:var(--ap-bg-2);color:var(--ap-fg-5);display:flex;align-items:center;justify-content:center;">fg-5 3A4256</div>
  </div>
</div></body></html>
