<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--ap-bg-0);color:var(--ap-fg-1);}
.card{padding:20px;display:flex;flex-direction:column;gap:12px;}
.stat-card{background:var(--ap-bg-2);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;gap:4px;border:1px solid var(--ap-line-soft);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.label{font-size:11px;color:var(--ap-fg-3);letter-spacing:.05em;}
.val{font-family:var(--ap-font-mono);font-variant-numeric:tabular-nums;font-size:22px;font-weight:600;}
.sub{font-size:12px;color:var(--ap-fg-3);font-family:var(--ap-font-mono);}
</style></head>
<body><div class="card">
<div class="grid">
  <div class="stat-card"><span class="label">账户权益</span><span class="val">$128,450.73</span><span class="sub ap-pos">+1.82% 今日</span></div>
  <div class="stat-card"><span class="label">浮动盈亏</span><span class="val ap-pos">+$1,248.05</span><span class="sub">2 个持仓</span></div>
  <div class="stat-card"><span class="label">今日交易</span><span class="val">7</span><span class="sub">胜率 57% · 赢 4</span></div>
  <div class="stat-card"><span class="label">最大回撤</span><span class="val ap-neg">−0.48%</span><span class="sub">阈值 −2.00%</span></div>
</div>
</div></body></html>
