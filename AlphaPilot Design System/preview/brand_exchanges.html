<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--ap-bg-0);color:var(--ap-fg-1);}
.card{padding:18px;display:flex;flex-direction:column;gap:10px;}
.row{display:flex;gap:10px;align-items:center;}
.ex{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--ap-bg-2);border-radius:12px;flex:1;}
.ex img{width:24px;height:24px;object-fit:contain;}
.ex .n{font-size:13px;font-weight:600;}
.ex .s{font-size:11px;color:var(--ap-fg-3);font-family:var(--ap-font-mono);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ap-mint);margin-left:auto;box-shadow:0 0 6px var(--ap-mint);}
</style></head>
<body><div class="card">
<div class="ap-label">Exchange connectors</div>
<div class="row">
  <div class="ex"><img src="../assets/binance_logo.svg"><div><div class="n">Binance</div><div class="s">MVP primary · Futures + Spot</div></div><span class="dot"></span></div>
</div>
<div class="row">
  <div class="ex"><img src="../assets/hyperliquid_logo.svg"><div><div class="n">Hyperliquid</div><div class="s">roadmap</div></div></div>
  <div class="ex"><img src="../assets/aster_logo.png"><div><div class="n">Aster</div><div class="s">roadmap</div></div></div>
</div>
</div></body></html>
