<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ap-bg-0);}
  .card{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{flex:1;min-width:0;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:2px;min-height:72px;justify-content:space-between;border:1px solid var(--ap-line);}
  .sw-name{font-size:11px;color:var(--ap-fg-2);font-weight:600;letter-spacing:.02em;}
  .sw-hex{font-family:var(--ap-font-mono);font-size:10px;color:var(--ap-fg-3);}
</style></head>
<body><div class="card">
  <div class="ap-label">Brand · Semantic</div>
  <div class="row">
    <div class="swatch" style="background:var(--ap-mint);"><span class="sw-name" style="color:#001a12">Mint · Profit</span><span class="sw-hex" style="color:#001a12">#00D395</span></div>
    <div class="swatch" style="background:var(--ap-rose);"><span class="sw-name" style="color:#2a0510">Rose · Loss</span><span class="sw-hex" style="color:#2a0510">#FF4D6D</span></div>
    <div class="swatch" style="background:var(--ap-violet);"><span class="sw-name">Violet · AI</span><span class="sw-hex" style="color:#efeaff">#7C5CFF</span></div>
    <div class="swatch" style="background:var(--ap-amber);"><span class="sw-name" style="color:#2a1f00">Amber · Warn</span><span class="sw-hex" style="color:#2a1f00">#F0B90B</span></div>
    <div class="swatch" style="background:var(--ap-cyan);"><span class="sw-name" style="color:#002028">Cyan · Info</span><span class="sw-hex" style="color:#002028">#22D3EE</span></div>
  </div>
</div></body></html>
