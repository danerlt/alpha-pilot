<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--ap-bg-0);color:var(--ap-fg-1);}
.card{padding:18px;display:flex;gap:20px;align-items:center;justify-content:center;}
.logo-wrap{display:flex;flex-direction:column;gap:8px;align-items:center;}
.logo{width:80px;height:80px;border-radius:18px;background:var(--ap-bg-2);display:flex;align-items:center;justify-content:center;padding:8px;}
.logo img{width:100%;height:100%;object-fit:contain;}
.name{font-size:11px;color:var(--ap-fg-3);font-family:var(--ap-font-mono);}
.wordmark{display:flex;align-items:center;gap:10px;}
.wm-logo{width:40px;height:40px;border-radius:10px;background:var(--ap-bg-2);padding:4px;}
.wm-logo img{width:100%;height:100%;object-fit:contain;}
.wm-text{font-size:20px;font-weight:700;letter-spacing:-.02em;}
.wm-text .ai{color:var(--ap-mint);}
</style></head>
<body><div class="card">
<div class="logo-wrap">
  <div class="logo"><img src="../assets/logo_app.png" alt="AlphaPilot"></div>
  <span class="name">app icon · 80px</span>
</div>
<div class="logo-wrap">
  <div class="wordmark">
    <div class="wm-logo"><img src="../assets/logo_app.png"></div>
    <span class="wm-text">Alpha<span class="ai">Pilot</span></span>
  </div>
  <span class="name">wordmark</span>
</div>
</div></body></html>
