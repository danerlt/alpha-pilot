<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--ap-bg-0);color:var(--ap-fg-1);}
.card{padding:18px;display:flex;flex-direction:column;gap:10px;}
.row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--ap-bg-2);border-radius:12px;}
.coin{width:36px;height:36px;border-radius:50%;background:var(--ap-bg-4);display:flex;align-items:center;justify-content:center;font-family:var(--ap-font-mono);font-weight:700;font-size:12px;flex-shrink:0;}
.c-btc{background:linear-gradient(135deg,#F7931A,#8B4E0D);color:#fff;}
.c-eth{background:linear-gradient(135deg,#627EEA,#3C54BD);color:#fff;}
.c-sol{background:linear-gradient(135deg,#9945FF,#14F195);color:#fff;}
.name{flex:1;min-width:0;}
.n1{font-size:14px;font-weight:600;}
.n2{font-size:11px;color:var(--ap-fg-3);font-family:var(--ap-font-mono);}
.p{text-align:right;font-family:var(--ap-font-mono);}
.p1{font-size:14px;font-weight:600;}
.p2{font-size:11px;}
</style></head>
<body><div class="card">
  <div class="row"><div class="coin c-btc">₿</div><div class="name"><div class="n1">BTCUSDT</div><div class="n2">0.048 · entry 67,420</div></div><div class="p"><div class="p1">$3,247.80</div><div class="p2 ap-pos">+2.14%</div></div></div>
  <div class="row"><div class="coin c-eth">Ξ</div><div class="name"><div class="n1">ETHUSDT</div><div class="n2">0.82 · entry 3,240</div></div><div class="p"><div class="p1">$2,662.40</div><div class="p2 ap-neg">−0.62%</div></div></div>
  <div class="row"><div class="coin c-sol">◎</div><div class="name"><div class="n1">SOLUSDT</div><div class="n2">18.5 · entry 152.30</div></div><div class="p"><div class="p1">$2,800.95</div><div class="p2 ap-pos">+1.08%</div></div></div>
</div></body></html>
