# Telegram 配置模板（待用户提供真实信息后填写）

telegram:
  group:
    chatId: "REPLACE_ME"
    title: "alpha-pilot team room"

  bots:
    alphaPolit:
      accountId: "alpha-pilot"
      botUsername: "REPLACE_ME"
      tokenRef: "REPLACE_ME"
    planner:
      accountId: "planner"
      botUsername: "REPLACE_ME"
      tokenRef: "REPLACE_ME"
    developer:
      accountId: "developer"
      botUsername: "REPLACE_ME"
      tokenRef: "REPLACE_ME"
    ops:
      accountId: "ops"
      botUsername: "REPLACE_ME"
      tokenRef: "REPLACE_ME"

routing:
  publicSummaryChannel: telegram
  publicSummaryTarget: "REPLACE_ME"

policy:
  phaseAnnouncementsOnly: true
  allowDirectMentionToSubBots: true
  replayGroupMessagesIntoExecutionContext: false
  allowUserConstraintInjection: true
